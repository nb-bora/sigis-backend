[alembic]
script_location = %(here)s/alembic

# Nommage : date + révision + slug  (ex. 2026_04_03_1200-a1b2c3d4_initial_schema.py)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

prepend_sys_path = .
path_separator = os

# L'URL est lue depuis SIGIS_DATABASE_URL via env.py — ne pas mettre de valeur ici.
sqlalchemy.url =

[post_write_hooks]
# Formate automatiquement chaque nouveau fichier de migration avec ruff.
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/.venv/Scripts/ruff.exe
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
