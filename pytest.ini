[pytest]
# Pytest configuration pour SIGIS V1 (95% coverage)

# Test paths
testpaths = tests

# Python path
pythonpath = .

# Markers
markers =
    asyncio: async tests (pytest-asyncio)
    integration: integration tests
    unit: unit tests
    e2e: end-to-end tests

# Coverage options
addopts =
    --cov=domain,application,infrastructure,api,common
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-branch
    --cov-fail-under=95
    -v
    --strict-markers

# Asyncio mode
asyncio_mode = auto

# Timeout (prevent hanging tests)
timeout = 30
timeout_method = thread

# Logging
log_cli = false
log_level = INFO
