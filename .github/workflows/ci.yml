# Pipeline d'intégration continue — qualité statique + tests sur plusieurs versions Python.
# Déclenché sur push/PR vers main et exécutable manuellement (workflow_dispatch).

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Alembic migrations (clean SQLite)
        env:
          SIGIS_DATABASE_URL: sqlite+aiosqlite:////tmp/alembic_ci_check.db
        run: python -m alembic upgrade head

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable + dev)
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: pytest -q --tb=short --color=yes --cov --cov-report=term-missing
