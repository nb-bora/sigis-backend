# Pipeline d'intégration continue — qualité statique + tests sur plusieurs versions Python.
# Déclenché sur push/PR vers main et exécutable manuellement (workflow_dispatch).

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  # Check PR title follows Conventional Commits
  pr-conventions:
    if: github.event_name == 'pull_request'
    name: "PR: Conventional Commits"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|perf|docs|style|refactor|test|chore)(\(.+\))?!?: .+"

          if [[ ! $TITLE =~ $PATTERN ]]; then
            echo "❌ PR title does not follow Conventional Commits"
            echo "Expected format: feat(scope): description"
            echo "Got: $TITLE"
            exit 1
          fi
          echo "✅ PR title follows Conventional Commits: $TITLE"

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Alembic migrations (clean SQLite)
        env:
          SIGIS_DATABASE_URL: sqlite+aiosqlite:////tmp/alembic_ci_check.db
        run: python -m alembic upgrade head

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable + dev)
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage (min 90%)
        run: |
          pytest \
            --cov=domain,application,infrastructure,api,common \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            --tb=short \
            --color=yes

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests-py${{ matrix.python-version }}
          name: codecov-py${{ matrix.python-version }}
          fail_ci_if_error: true
